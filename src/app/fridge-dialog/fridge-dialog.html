<h2 mat-dialog-title>Edit food characteristics</h2>
<mat-dialog-content>
  <div class="form-content">
    <mat-form-field>
      <mat-label>Category</mat-label>
      <input #input 
             matInput 
             type="text" 
             [(ngModel)]="category" 
             [matAutocomplete]="auto"
             (input)="filterCategoryOptions()"
             (focus)="filterCategoryOptions()"/>
      <mat-autocomplete #auto="matAutocomplete" requireSelection>
        @for (categoryName of filteredCategoryNames ; track categoryName) {
          <mat-option [value]="categoryName">{{categoryName}}</mat-option>
        }
      </mat-autocomplete>
    </mat-form-field>
    @if (category()) {
      <mat-form-field>
        <mat-label>Precise Name</mat-label>
        <input matInput type="text" [(ngModel)]="name" required/>
      </mat-form-field>
      <mat-form-field>
        <mat-label>Quantity {{ getCategoryUnit() }}</mat-label>
        <input matInput type="number" min="0" [(ngModel)]="quantity" required/>
      </mat-form-field>
      <mat-form-field>
        <mat-label>Choose a date</mat-label>
        <input matInput [matDatepicker]="picker" [(ngModel)]="expiryDate"/>
        <mat-hint>DD/MM/YYYY</mat-hint>
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>
      <mat-checkbox [(ngModel)]="opened">
        Opened
      </mat-checkbox>
    }
  </div>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton (click)="quit()">No Thanks</button>
  <button matButton [mat-dialog-close]="save()" cdkFocusInitial>Ok</button>
</mat-dialog-actions>
